# ==============================================================================
# Terraform Apply — runs on merge to main
# Dev auto-applies. Prod requires manual approval via GitHub Environments.
#
# Required GitHub Secrets:
#   GCP_WORKLOAD_IDENTITY_PROVIDER  — full WIF provider resource name
#   GCP_SERVICE_ACCOUNT             — SA email with terraform permissions
# Required GitHub Variables:
#   GCP_PROJECT_ID                  — your GCP project ID
#
# Required GitHub Environment setup:
#   Create an Environment named "production" in repo Settings → Environments
#   Add required reviewers so prod apply requires human sign-off.
# ==============================================================================

name: Terraform Apply

on:
  push:
    branches: [main]
    paths:
      - "environments/**"
      - "modules/**"

permissions:
  contents: read
  id-token: write # Workload Identity Federation

env:
  TF_VERSION: "1.7.5"
  TF_IN_AUTOMATION: "true"

jobs:
  # ── Dev: auto-apply ────────────────────────────────────────────────────────
  apply-dev:
    name: Apply (dev)
    runs-on: ubuntu-latest
    environment: development
    if: github.ref == 'refs/heads/main'

    defaults:
      run:
        working-directory: environments/dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Apply
        run: |
          terraform apply \
            -var="project_id=${{ vars.GCP_PROJECT_ID }}" \
            -auto-approve \
            -input=false

  # ── Prod: requires manual approval ────────────────────────────────────────
  apply-prod:
    name: Apply (prod)
    runs-on: ubuntu-latest
    environment: production      # ← set required reviewers in GitHub settings
    needs: apply-dev
    if: github.ref == 'refs/heads/main'

    defaults:
      run:
        working-directory: environments/prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Plan (final check before apply)
        run: |
          terraform plan \
            -var="project_id=${{ vars.GCP_PROJECT_ID }}" \
            -no-color \
            -input=false

      - name: Terraform Apply
        run: |
          terraform apply \
            -var="project_id=${{ vars.GCP_PROJECT_ID }}" \
            -auto-approve \
            -input=false
