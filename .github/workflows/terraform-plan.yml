# ==============================================================================
# Terraform Plan — runs on every pull request
# Authenticates via Workload Identity Federation (no long-lived SA keys).
# Posts a plan diff as a PR comment for easy review.
#
# Required GitHub Secrets:
#   GCP_WORKLOAD_IDENTITY_PROVIDER  — full WIF provider resource name
#   GCP_SERVICE_ACCOUNT             — SA email with terraform permissions
# Required GitHub Variables:
#   GCP_PROJECT_ID                  — your GCP project ID
# ==============================================================================

name: Terraform Plan

on:
  pull_request:
    branches: [main]
    paths:
      - "environments/**"
      - "modules/**"
      - ".github/workflows/terraform-*.yml"

permissions:
  contents: read
  pull-requests: write      # post plan as PR comment
  id-token: write           # required for Workload Identity Federation

env:
  TF_VERSION: "1.7.5"
  TF_IN_AUTOMATION: "true"

jobs:
  # ── Detect changed environment ─────────────────────────────────────────────
  changes:
    name: Detect Changed Environments
    runs-on: ubuntu-latest
    outputs:
      dev:  ${{ steps.filter.outputs.dev }}
      prod: ${{ steps.filter.outputs.prod }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            dev:
              - 'environments/dev/**'
              - 'modules/**'
            prod:
              - 'environments/prod/**'
              - 'modules/**'

  # ── Plan job (runs once per changed environment) ───────────────────────────
  plan:
    name: Plan (${{ matrix.environment }})
    runs-on: ubuntu-latest
    needs: changes
    if: |
      (matrix.environment == 'dev'  && needs.changes.outputs.dev  == 'true') ||
      (matrix.environment == 'prod' && needs.changes.outputs.prod == 'true')

    strategy:
      fail-fast: false
      matrix:
        environment: [dev, prod]

    defaults:
      run:
        working-directory: environments/${{ matrix.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Keyless authentication to GCP via Workload Identity Federation
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: terraform init -input=false

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var="project_id=${{ vars.GCP_PROJECT_ID }}" \
            -no-color \
            -out=tfplan \
            -input=false
        continue-on-error: true

      # Post plan output as a PR comment
      - name: Post Plan to PR
        uses: actions/github-script@v7
        env:
          PLAN: ${{ steps.plan.outputs.stdout }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const environment = '${{ matrix.environment }}';
            const fmtOutcome   = '${{ steps.fmt.outcome }}';
            const initOutcome  = '${{ steps.init.outcome }}';
            const validateOut  = `${{ steps.validate.outputs.stdout }}`;
            const planOutcome  = '${{ steps.plan.outcome }}';
            const planOutput   = process.env.PLAN;

            const body = `## Terraform Plan — \`${environment}\`

            | Step | Status |
            |------|--------|
            | Format | ${fmtOutcome === 'success' ? '✅' : '❌'} |
            | Init   | ${initOutcome === 'success' ? '✅' : '❌'} |
            | Plan   | ${planOutcome === 'success' ? '✅' : '❌'} |

            <details><summary>Show Plan</summary>

            \`\`\`hcl
            ${planOutput}
            \`\`\`

            </details>

            *Triggered by @${{ github.actor }} on \`${{ github.ref }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Check Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1
